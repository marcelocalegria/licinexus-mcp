name: Canary (smoke against real PNCP + BrasilAPI)

# Runs npm run smoke daily and opens / closes a tracking issue automatically.
# This catches upstream API breakage (PNCP, BrasilAPI) before users hit it.
#
# Behavior:
#   - Schedule: daily at 11:00 UTC = 08:00 BRT (business hours in Brazil)
#   - On failure: opens or comments on a single tracking issue labeled `canary`
#   - On success: closes any open tracking issue with a recovery comment
#   - Manual trigger: workflow_dispatch button in the Actions tab

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      smoke_passed: ${{ steps.smoke.outputs.passed }}
      summary: ${{ steps.smoke.outputs.summary }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run smoke test
        id: smoke
        run: |
          set +e
          npm run smoke 2>&1 | tee smoke-output.txt
          status=${PIPESTATUS[0]}
          set -e

          # Compact summary: only the result lines
          summary=$(grep -E "^(✓|✗|Result:)" smoke-output.txt | head -30 || true)

          {
            echo "summary<<EOF"
            echo "$summary"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ "$status" -eq 0 ]; then
            echo "passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "passed=false" >> "$GITHUB_OUTPUT"
          fi

          # Don't fail the workflow — we want the next steps to run
          # whether smoke passed or not. The notify steps decide what to do.
          exit 0

      - name: Save full output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-output
          path: smoke-output.txt
          retention-days: 14

  notify:
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5

    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Find existing canary issue
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          number=$(gh issue list \
            --label canary \
            --state open \
            --json number \
            --jq '.[0].number' \
            --limit 1 || echo "")
          echo "number=${number}" >> "$GITHUB_OUTPUT"
          echo "Found existing canary issue: ${number:-<none>}"

      - name: Open or comment (smoke FAILED)
        if: needs.smoke.outputs.smoke_passed == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SUMMARY: ${{ needs.smoke.outputs.summary }}
          EXISTING: ${{ steps.find.outputs.number }}
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          BODY=$(cat <<MSG
          Canary smoke test failed at ${DATE}.

          ### Result summary
          \`\`\`
          ${SUMMARY}
          \`\`\`

          ### Diagnosis
          - If most checks failed with timeout → upstream PNCP is slow / down (transient)
          - If only one check fails → likely a real schema or endpoint regression
          - Check the [full run](${RUN_URL}) for stack traces

          ### What to do
          - **Transient** → wait, the next canary will close this if PNCP recovers
          - **Persistent (3+ days)** → fix the adapter or open an issue upstream

          (Auto-generated by .github/workflows/canary.yml)
          MSG
          )

          if [ -n "${EXISTING}" ]; then
            echo "Adding comment to existing issue #${EXISTING}"
            gh issue comment "${EXISTING}" --body "${BODY}"
          else
            echo "Creating new canary issue"
            gh issue create \
              --title "[canary] Smoke test failing against PNCP / BrasilAPI" \
              --label "canary,bug,triage" \
              --body "${BODY}"
          fi

      - name: Close on recovery (smoke PASSED)
        if: needs.smoke.outputs.smoke_passed == 'true' && steps.find.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          NUMBER: ${{ steps.find.outputs.number }}
        run: |
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")

          gh issue comment "${NUMBER}" --body "✅ Recovered at ${DATE}. All smoke checks passed in [run](${RUN_URL}). Closing."
          gh issue close "${NUMBER}" --reason completed
